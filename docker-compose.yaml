services:
  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "5001:5001"

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "5002:5002"

  frontend-service:
    build: ./frontend-service
    container_name: frontend-service
    ports:
      - "3000:3000"
    depends_on:
      - product-service
      - order-service